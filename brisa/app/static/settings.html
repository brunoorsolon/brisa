<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brisa — Settings</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; }
    .warning-box {
      background: #f59e0b12; border: 1px solid #f59e0b40;
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 12px; color: var(--warn); margin-top: 16px;
      display: none;
    }
    .warning-box.visible { display: block; }
    .input-with-unit { position: relative; }
    .input-with-unit .unit {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
      pointer-events: none;
    }
    .input-with-unit input { padding-right: 40px; }
  </style>
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div class="page">
      <div class="page-header">
        <h1 class="page-title">Settings</h1>
        <p class="page-subtitle">Global service configuration</p>
      </div>

      <div class="card" style="max-width: 600px">
        <div class="card-title">Control Loop</div>

        <div class="settings-grid">
          <div class="form-group">
            <label class="form-label">Poll interval</label>
            <div class="input-with-unit">
              <input class="form-input" type="number" id="interval-seconds" min="10" max="3600" />
              <span class="unit">sec</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Safety floor</label>
            <div class="input-with-unit">
              <input class="form-input" type="number" id="safety-floor" min="0" max="100" />
              <span class="unit">%</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">History retention</label>
            <div class="input-with-unit">
              <input class="form-input" type="number" id="history-days" min="1" max="365"
                oninput="checkRowWarning()" />
              <span class="unit">days</span>
            </div>
          </div>
        </div>

        <div class="warning-box" id="row-warning"></div>

        <div style="margin-top:8px">
          <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/app.js"></script>
  <script>
    let config = null;

    async function loadConfig() {
      try {
        config = await api('GET', '/config');
        document.getElementById('interval-seconds').value = config.settings.interval_seconds;
        document.getElementById('safety-floor').value = config.settings.safety_floor_percent;
        document.getElementById('history-days').value = config.settings.history_days;
        checkRowWarning();
      } catch (e) {
        showToast('Failed to load config: ' + e.message, 'error');
      }
    }

    function checkRowWarning() {
      const interval = parseInt(document.getElementById('interval-seconds').value) || 60;
      const days = parseInt(document.getElementById('history-days').value) || 30;
      const estimatedRows = (86400 / interval) * days;
      const warn = document.getElementById('row-warning');
      if (estimatedRows > 5_000_000) {
        warn.textContent = `⚠ Estimated ~${(estimatedRows / 1_000_000).toFixed(1)}M rows — consider reducing retention or increasing interval.`;
        warn.classList.add('visible');
      } else {
        warn.classList.remove('visible');
      }
    }

    async function saveSettings() {
      config.settings.interval_seconds = parseInt(document.getElementById('interval-seconds').value);
      config.settings.safety_floor_percent = parseInt(document.getElementById('safety-floor').value);
      config.settings.history_days = parseInt(document.getElementById('history-days').value);

      try {
        await api('POST', '/config', config);
        showToast('Settings saved', 'ok');
      } catch (e) {
        showToast('Save failed: ' + e.message, 'error');
        await loadConfig();
      }
    }

    loadConfig();
  </script>
</body>
</html>
